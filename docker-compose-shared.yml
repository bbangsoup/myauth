# ================================================
# Docker Compose - 怨듭쑀 MySQL 踰꾩쟾
# ?щ윭 ?꾨줈?앺듃?먯꽌 媛숈? MySQL ?ъ슜
# ================================================

version: '3.8'

services:
  # 怨듭쑀 MySQL ?곗씠?곕쿋?댁뒪
  mysql:
    image: mysql:8
    container_name: shared-mysql

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: 1234
      TZ: Asia/Seoul

    # ?곗씠??蹂댁〈
    volumes:
      - /Users/eunbumkim/datadir:/var/lib/mysql

    # ?몃? ?ㅽ듃?뚰겕 ?ъ슜
    networks:
      - shared-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 5s
      timeout: 3s
      retries: 10

    restart: unless-stopped

  # Spring Boot ?좏뵆由ъ??댁뀡
  myauth:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: myauth

    ports:
      - "9080:9080"

    environment:
      DB_URL: jdbc:mysql://shared-mysql:3306/mannal?useSSL=false&serverTimezone=Asia/Seoul&connectionTimeZone=Asia/Seoul&forceConnectionTimeZoneToSession=true&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: 1234
      JWT_SECRET: mySecretKeyForJWTTokenGenerationThisKeyMustBeLongEnoughForHS512Algorithm
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
      KAKAO_CLIENT_ID: f0bfa98dfa477735feeb8dbfdfa1d105
      KAKAO_CLIENT_SECRET: U4JgTAZGirCvVGmmnvuSlsoWlKFPstvV
      KAKAO_REDIRECT_URI: http://localhost:9080/api/auth/kakao/callback
      SPRING_PROFILES_ACTIVE: dev
      FILE_UPLOAD_DIR: /app/uploads
      FILE_UPLOAD_BASE_URL: http://localhost:9080/uploads

    volumes:
      - myauth-upload-data:/app/uploads

    networks:
      - shared-network

    depends_on:
      mysql:
        condition: service_healthy

    restart: unless-stopped
# no             | ?먮룞 ?ъ떆???덊븿 (湲곕낯媛?
# always         | ??긽 ?ъ떆??(?섎룞 以묒??대룄 Docker ?ъ떆?????먮룞 ?쒖옉)
# on-failure     | ?ㅽ뙣 ?쒖뿉留??ъ떆??(醫낅즺 肄붾뱶 ??0)
# unless-stopped | ?섎룞 以묒??섏? ?딅뒗 ????긽 ?ъ떆??狩?

# ?몃??먯꽌???ъ슜 媛?ν븳 ?ㅽ듃?뚰겕
networks:
  shared-network:
    driver: bridge
    name: shared-network  # 紐낆떆???대쫫 吏??

volumes:
  myauth-upload-data:
    driver: local
    name: myauth-upload-data

