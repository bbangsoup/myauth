# ================================================
# 媛쒕컻 ?섍꼍 ?ㅼ젙 (application-dev.yaml)
# ?ъ슜 諛⑸쾿: --spring.profiles.active=dev
# ================================================

# ?쒕쾭 ?ㅼ젙 - HTTP (媛쒕컻 ?섍꼍)
server:
  port: 9080  # HTTP ?ы듃 (媛쒕컻 ?섍꼍)

# 濡쒓퉭 ?ㅼ젙 - 媛쒕컻 ?섍꼍?먯꽌???곸꽭??濡쒓렇 異쒕젰
logging:
  level:
    root: INFO
    com.example.myauth: DEBUG
    # Spring Security ?꾪꽣 泥댁씤 ?붾쾭洹?濡쒓퉭 (媛쒕컻 ?섍꼍?먯꽌留??쒖꽦??
    org.springframework.security: DEBUG
    org.springframework.security.web.DefaultSecurityFilterChain: DEBUG

# JPA ?ㅼ젙 - 媛쒕컻 ?섍꼍?먯꽌??SQL 濡쒓렇 異쒕젰
spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ?좏뵆由ъ??댁뀡 而ㅼ뒪? ?ㅼ젙
app:
  # 荑좏궎 蹂댁븞 ?ㅼ젙
  cookie:
    secure: false  # HTTP 媛쒕컻 ?섍꼍?먯꽌??false ?ㅼ젙

  # CORS ?덉슜 異쒖쿂 (媛쒕컻 ?섍꼍)
  cors:
    allowed-origins:
      - http://localhost:5173      # Vite 媛쒕컻 ?쒕쾭
      - http://localhost

    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allow-credentials: true  # 荑좏궎 ?꾩넚 ?덉슜

  # OAuth 由щ떎?대젆???ㅼ젙
  oauth:
    kakao-redirect-url: http://localhost:9080/api/auth/kakao/callback  # 移댁뭅??濡쒓렇???깃났 ??由щ떎?대젆?명븷 ?꾨줎?몄뿏??URL


# 媛쒕컻 ?섍꼍 ?ㅽ뻾
