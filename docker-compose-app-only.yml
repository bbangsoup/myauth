version: '3.8'

services:
  myauth:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: myauth

    ports:
      - "9080:9080"

    environment:
      # localhost濡?MySQL ?곌껐 (dev-mysql 而⑦뀒?대꼫??3306 ?ы듃 ?ъ슜)
      DB_URL: jdbc:mysql://localhost:3306/myauth?useSSL=false&serverTimezone=Asia/Seoul&connectionTimeZone=Asia/Seoul&forceConnectionTimeZoneToSession=true&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: 1234

      JWT_SECRET: mySecretKeyForJWTTokenGenerationThisKeyMustBeLongEnoughForHS512Algorithm
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000

      KAKAO_CLIENT_ID: f0bfa98dfa477735feeb8dbfdfa1d105
      KAKAO_CLIENT_SECRET: U4JgTAZGirCvVGmmnvuSlsoWlKFPstvV
      KAKAO_REDIRECT_URI: http://localhost:9080/api/auth/kakao/callback

      SPRING_PROFILES_ACTIVE: dev
      FILE_UPLOAD_DIR: /app/uploads
      FILE_UPLOAD_BASE_URL: http://localhost:9080/uploads

    volumes:
      - myauth-upload-data:/app/uploads

    # ?몄뒪???ㅽ듃?뚰겕 紐⑤뱶 (localhost濡?MySQL ?묎렐)
    network_mode: host

    restart: unless-stopped

volumes:
  myauth-upload-data:
    driver: local
    name: myauth-upload-data

